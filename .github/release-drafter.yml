name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

template: |
  ## 🚀 Changelog
  $CHANGES

include-merged-pull-requests: true

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - fix
      - perf

categories:
  - title: '🚀 Features'
    labels:
      - feature
      - enhancement

  - title: '🐛 Bug Fixes'
    labels:
      - bug
      - fix

  - title: '⚡ Performance'
    labels:
      - perf

  - title: '📚 Documentation'
    labels:
      - docs

  - title: '🧹 Maintenance'
    labels:
      - chore
      - refactor

change-template: '- $TITLE (#$NUMBER) — @$AUTHOR'

exclude-labels:
  - skip-changelog
  - skip-changelogs
